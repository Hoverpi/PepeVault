<!-- templates/generator.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Password Generator</title>

  <link rel="stylesheet" href="/static/css/Poppins.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/vault.css"> <!-- shared styles / blobs -->
  <link rel="stylesheet" href="/static/css/generator.css"> <!-- page-specific -->
</head>
<body class="with-sidebar page-darker text-bright"> <!-- text-bright nudges letters whiter -->

  {{template "sidebar" .}}

  <main class="main-content generator-main">
    <header class="vault-header">
      <h1>Password Generator</h1>
      <button class="btn-primary" id="copyBtn">Copy</button>
    </header>

    <section class="generator-card">
      <div class="output">
        <input id="passwordOutput" readonly value="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022">
      </div>

      <div class="controls">
        <label><input type="checkbox" id="useSymbols" checked> Symbols</label>
        <label><input type="checkbox" id="useNumbers" checked> Numbers</label>
        <label><input type="checkbox" id="useLower" checked> Lower</label>
        <label><input type="checkbox" id="useUpper" checked> Upper</label>
      </div>

      <div class="actions">
        <input type="range" id="lengthRange" min="8" max="64" value="16">
        <span id="lengthValue">16</span>
        <button class="btn-primary" id="generateBtn">Generate</button>
      </div>
    </section>
  </main>

  <script>
    // tiny client-side generator for demo
    const generateBtn = document.getElementById('generateBtn');
    const output = document.getElementById('passwordOutput');
    const lengthRange = document.getElementById('lengthRange');
    const lengthValue = document.getElementById('lengthValue');
    lengthRange.addEventListener('input', () => lengthValue.textContent = lengthRange.value);

    function genPassword() {
      const len = +lengthRange.value;
      const useSymbols = document.getElementById('useSymbols').checked;
      const useNumbers = document.getElementById('useNumbers').checked;
      const useLower = document.getElementById('useLower').checked;
      const useUpper = document.getElementById('useUpper').checked;
      let chars = '';
      if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (useNumbers) chars += '0123456789';
      if (useSymbols) chars += '!@#$%^&*()-_=+[]{};:,.<>?';
      if (!chars) { output.value = 'Choose at least one group'; return; }
      let pw = '';
      for (let i=0;i<len;i++) pw += chars.charAt(Math.floor(Math.random()*chars.length));
      output.value = pw;
    }

    generateBtn.onclick = genPassword;
    document.getElementById('copyBtn').onclick = () => {
      navigator.clipboard.writeText(output.value).then(()=> {
        alert('copied');
      });
    };
  </script>
</body>
</html>
